                updated["CUSTOM (USER)"].push(newItem);
                setMotors(updated);
                localStorage.setItem('slot_custom_motors', JSON.stringify(updated["CUSTOM (USER)"]));

            };

            const handleDelete = (idx) => {
                const updated = { ...motors };

        const WeightShowcase = ({ selectedCarId, currentConfig, onUpdate, t }) => {

            const weightLabels = { body: "CARROCERÍA", chassis: "CHASIS 3D", trans: "EJES/TRANS", wheels: "LLANTAS", cockpit: "COCKPIT" };
            
            const handleWeightChange = (id, value) => {

            return (

                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="w-[100px] flex flex-col justify-center items-end pb-2">
                            <div className="text-right w-full mb-4">
                                <span className="text-[9px] text-orange-400/60 font-bold tracking-widest uppercase block mb-1.5 text-center">PESO TOTAL</span>
                                <div className="relative bg-black/40 px-2 py-3 rounded-lg border border-orange-500/20 shadow-[inset_0_0_10px_rgba(0,0,0,1)] flex justify-center items-baseline">
                                    <span className="font-digital text-3xl font-black text-white drop-shadow-[0_0_10px_rgba(249,115,22,0.8)] leading-none">{totalWeight.toFixed(1)}</span>
                                    <span className="text-xs font-bold text-orange-400 ml-1">g</span>

                            <div className="w-full flex items-end gap-[4px] h-16 opacity-80 justify-center">
                                {Object.entries(weightLabels).map(([id, label], i) => {

        };

        const VoltageShowcase = ({ voltage, setVoltage, t }) => { 
            const [amps, setAmps] = useState(1.2); 
            const [history, setHistory] = useState(new Array(24).fill(0.2)); 
            
            useEffect(() => { 
                const interval = setInterval(() => { 
                    const baseAmps = (voltage / 12) * 1.5; 
                    const noise = (Math.random() - 0.5) * 0.15; 
                    const newAmps = Math.max(0, baseAmps + noise); 
                    setAmps(newAmps); 
                    setHistory(prev => { 
                        const barHeight = Math.min(1, Math.max(0.1, newAmps / 3)); 
                        return [...prev.slice(1), barHeight]; 
                    }); 
                }, 100); 
                return () => clearInterval(interval); 
            }, [voltage]); 
            
            return (
                <div className="w-full h-full flex flex-col relative z-10 text-white" title="Fuente de alimentación estabilizada">
                    <svg className="absolute top-0 left-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M1 1 L10 1 L10 2 L2 2 L2 10 L1 10 Z" fill="#f97316"/></svg>
                    <svg className="absolute top-0 right-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M31 1 L22 1 L22 2 L30 2 L30 10 L31 10 Z" fill="#f97316"/></svg>
                    <svg className="absolute bottom-0 left-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M1 31 L10 31 L10 30 L2 30 L2 22 L1 22 Z" fill="#f97316"/></svg>
                    <svg className="absolute bottom-0 right-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M31 31 L22 31 L22 30 L30 30 L30 22 L31 22 Z" fill="#f97316"/></svg>
                    
                    <div className="p-3 border-b border-orange-500/20 bg-orange-500/10 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-2"> 
                            <Battery className="text-orange-400" size={16} /> 
                            <h2 className="text-xs font-black text-white tracking-[0.2em] uppercase">{t.garage?.powerSupply || 'FUENTE DS-3'}</h2> 
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_5px_red]"></div>
                            <span className="text-[10px] text-orange-400/70 font-mono">ON AIR</span>
                        </div>
                    </div>
                    
                    <div className="flex flex-col p-4 gap-3 h-full relative overflow-hidden">
                        <div className="grid grid-cols-2 gap-3 h-20">
                            <div className="bg-black border border-orange-500/30 rounded-lg relative flex flex-col items-center justify-center shadow-[inset_0_0_15px_rgba(0,0,0,1)]">
                                <span className="absolute top-1 left-1.5 text-[8px] text-orange-400/60 font-bold tracking-wider">VOLTAJE</span>
                                <div className="flex items-baseline gap-0.5 mt-2">
                                    <span className="font-digital text-3xl font-black text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)] tracking-widest leading-none">{voltage.toFixed(1)}</span>
                                    <span className="text-[12px] font-bold text-orange-400 ml-1">V</span>
                                </div>
                            </div>
                            <div className="bg-black border border-orange-500/30 rounded-lg relative flex flex-col items-center justify-center shadow-[inset_0_0_15px_rgba(0,0,0,1)]">
                                <span className="absolute top-1 left-1.5 text-[8px] text-orange-400/60 font-bold tracking-wider">CORRIENTE</span>
                                <div className="flex items-baseline gap-0.5 mt-2">
                                    <span className="font-digital text-3xl font-black text-orange-400 drop-shadow-[0_0_8px_#f97316] tracking-widest leading-none">{amps.toFixed(2)}</span>
                                    <span className="text-[12px] font-bold text-orange-400 ml-1">A</span>
                                </div>
                                <div className="absolute top-2 right-2 w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_5px_red]"></div>
                            </div>
                        </div>
                        <div className="flex-1 bg-black/50 border border-orange-500/20 rounded-lg flex items-end px-1 gap-[2px] relative overflow-hidden mt-1">
                            <div className="absolute inset-0 opacity-20" style={{backgroundImage: 'linear-gradient(transparent 3px, #f97316 3px)', backgroundSize: '100% 4px'}}></div>
                            {history.map((h, i) => (
                                <div key={i} className="flex-1 bg-orange-500/60 shadow-[0_0_5px_#f97316] rounded-t-sm" style={{height: `${h * 100}%`, transition: 'height 0.1s ease'}}></div>
                            ))}
                            <span className="absolute top-1 right-1.5 text-[8px] text-orange-400/50 font-mono font-bold">LOAD MONITOR</span>
                        </div>
                        <div className="flex items-center gap-3 mt-2">
                            <button onClick={() => setVoltage(Math.max(10, voltage - 0.5))} className="w-10 h-8 rounded bg-gray-900 border border-gray-700 hover:border-orange-500 hover:bg-orange-500/20 text-gray-400 hover:text-orange-400 flex items-center justify-center transition-all active:scale-95"><Minus size={14}/></button>
                            <div className="flex-1 h-2 bg-gray-900 rounded-full overflow-hidden border border-gray-700 relative group-hover:border-orange-500/30 transition-colors">
                                <div className="absolute top-0 bottom-0 left-0 bg-gradient-to-r from-orange-500/40 to-orange-500 shadow-[0_0_10px_#f97316] transition-all duration-300" style={{width: `${((voltage - 10) / 10) * 100}%`}}></div>
                            </div>
                            <button onClick={() => setVoltage(Math.min(20, voltage + 0.5))} className="w-10 h-8 rounded bg-gray-900 border border-gray-700 hover:border-orange-500 hover:bg-orange-500/20 text-gray-400 hover:text-orange-400 flex items-center justify-center transition-all active:scale-95"><Plus size={14}/></button>
                        </div>
                    </div>
                </div>
            ); 
        };

        // GEOMETRÍA ABSOLUTA
        const getPieceGeometry = (p) => {
            if (!p || p.type === 'set_origin' || p.type === 'goto') return null; // FIX: Protección
            let dx = 0, dy = 0, da = 0;
            if (p.type === 'straight' || (p.type && p.type.includes('pit'))) { 
                dx = p.length; 
            } else if (p.type === 'curve') {
                const r = Math.abs(p.radius);
                const aRad = (p.angle * Math.PI) / 180;
                if (p.direction === 'left') { 
                    dx = r * Math.sin(aRad); dy = -r * (1 - Math.cos(aRad)); da = -aRad; 
                } else { 
                    dx = r * Math.sin(aRad); dy = r * (1 - Math.cos(aRad)); da = aRad; 
                }
            } else if (p.type === 'rotonda' || p.subtype === 'rotonda') {
                da = Math.PI; // Da la vuelta entera, vuelve al mismo punto pero girado
            }

            const rot = p.rot || 0;
            const exitX = p.x + dx * Math.cos(rot) - dy * Math.sin(rot);
            const exitY = p.y + dx * Math.sin(rot) + dy * Math.cos(rot);
            const exitAngle = rot + da;

            // Calcular el centro visual para el Hit Test y el Gizmo
            let midX = (p.x + exitX) / 2;
            let midY = (p.y + exitY) / 2;
            let hitRadius = p.type === 'straight' ? p.length / 2 : Math.abs(p.radius || 20);

            if (p.type === 'rotonda' || p.subtype === 'rotonda') {
                const straightLen = 1.0;
                midX = p.x + (straightLen + (p.radius || 15)) * Math.cos(rot);
                midY = p.y + (straightLen + (p.radius || 15)) * Math.sin(rot);
                hitRadius = (p.radius || 15) + straightLen;
            }

            return {
                inX: p.x, inY: p.y, inAngle: rot,
                outX: exitX, outY: exitY, outAngle: exitAngle,
                localDx: dx, localDy: dy, localDa: da,
                midX, midY, hitRadius
            };
        };

        // Migración de circuitos viejos (secuenciales) a absolutos
        const migrateToAbsolute = (piecesList, circuitOrigin = {x:0, y:0}) => {
            let cx = circuitOrigin.x || 0, cy = circuitOrigin.y || 0, currentAngle = 0;
            const endPos = {};

            return piecesList.map((p, index) => {
                if (!p) return null; // FIX: Saltar nulos
                
                if (p.type === 'set_origin') {
                    cx = circuitOrigin.x + (p.x || 0);
                    cy = circuitOrigin.y + (p.y || 0);
                    currentAngle = p.angle || 0;
                    endPos[p.uid] = { cx, cy, currentAngle };
                    return { ...p, x: cx, y: cy, rot: currentAngle };
                }

                if (p.type === 'goto') {
                    if (endPos[p.targetUid]) {
                        cx = endPos[p.targetUid].cx;
                        cy = endPos[p.targetUid].cy;
                        currentAngle = endPos[p.targetUid].currentAngle;
                    }
                    endPos[p.uid] = { cx, cy, currentAngle };
                    return { ...p, x: cx, y: cy, rot: currentAngle };
                }

                if (p.x !== undefined && p.rot !== undefined) return p; 
                
                let pX = cx, pY = cy, pRot = currentAngle;
                if (p.invert && p.subtype !== 'rotonda') pRot += Math.PI;

                let dx = 0, dy = 0, dAngle = 0;
                if (p.type === 'rotonda' || p.subtype === 'rotonda') { dAngle = Math.PI; }
                else if (p.type === 'straight' || (p.type && p.type.includes('pit'))) { dx = p.length; }
                else if (p.type === 'curve') {
                    const r = Math.abs(p.radius);
                    const aRad = (p.angle * Math.PI) / 180;
                    if (p.direction === 'left') { dx = r * Math.sin(aRad); dy = -r * (1 - Math.cos(aRad)); dAngle = -aRad; }
                    else { dx = r * Math.sin(aRad); dy = r * (1 - Math.cos(aRad)); dAngle = aRad; }
                }
                if (p.invert && p.subtype !== 'rotonda') { dx = -dx; dy = -dy; }

                cx += dx * Math.cos(currentAngle) - dy * Math.sin(currentAngle);
                cy += dx * Math.sin(currentAngle) + dy * Math.cos(currentAngle);
                currentAngle += dAngle;

                endPos[p.uid] = { cx, cy, currentAngle };

                return { ...p, x: pX, y: pY, rot: pRot, invert: false }; 
            }).filter(p => p && p.type !== 'goto' && p.type !== 'set_origin'); 
        };

        // Compilador para 3D (Ordena y sella matemáticamente las uniones para evitar trompicones)
        const compileCircuitFor3D = (rawPieces) => {
            if (!rawPieces || rawPieces.length === 0) return [];
            
            const lanes = {};
            rawPieces.forEach(p => {
                const laneId = p.lane || 0;
                if (!lanes[laneId]) lanes[laneId] = [];
                lanes[laneId].push(p);
            });

            let compiled = [];

            Object.keys(lanes).sort((a,b)=>a-b).forEach(laneId => {
                let pool = [...lanes[laneId]];
                if (pool.length === 0) return;

                let startIdx = pool.findIndex(p => p.subtype === 'analog_connect' || p.subtype === 'connection' || p.subtype === 'starting_grid' || p.subtype === 'rotonda_connect');
                if (startIdx === -1) startIdx = 0;

                let current = pool.splice(startIdx, 1)[0];
                compiled.push(current);

                const THRESHOLD = 3.0; // 3 cm de tolerancia para coser pistas

                while (pool.length > 0) {
                    let nextIdx = -1;

                    // Solo intentamos buscar la siguiente pista si la actual NO es una rotonda
                    // (ya que la rotonda es un final de tramo de rally).
                    if (current.type !== 'rotonda' && current.subtype !== 'rotonda') {
                        const currentGeo = getPieceGeometry(current);
                        if (currentGeo) {
                            let minDistance = Infinity;

                            for (let i = 0; i < pool.length; i++) {
                                const candidate = pool[i];
                                const candGeo = getPieceGeometry(candidate);
                                if (!candGeo) continue;

                                const dist = Math.hypot(currentGeo.outX - candGeo.inX, currentGeo.outY - candGeo.inY);
                                if (dist < THRESHOLD && dist < minDistance) {
                                    minDistance = dist;
                                    nextIdx = i;
                                }
                            }
                        }
                    }

                    if (nextIdx !== -1) {
                        let nextPiece = { ...pool.splice(nextIdx, 1)[0] };
                        // SANACIÓN MATEMÁTICA: Eliminamos los errores de redondeo de los decimales
                        const currentGeo = getPieceGeometry(current);
                        nextPiece.x = Math.round(currentGeo.outX * 10000) / 10000;
                        nextPiece.y = Math.round(currentGeo.outY * 10000) / 10000;
                        nextPiece.rot = Math.round(currentGeo.outAngle * 10000) / 10000;
                        
                        compiled.push(nextPiece);
                        current = nextPiece;
                    } else {
                        // Salto, pista desconectada, o venimos de una rotonda. Continuamos con la siguiente del pool.
                        let nextLoose = pool.splice(0, 1)[0];
                        compiled.push(nextLoose);
                        current = nextLoose;
                    }
                }
            });

            // --- MAGIA PARA EL 3D ---
            // Simplemente aseguramos que ambas rotondas usen el subtype 'rotonda' 
            // para que el motor 3D cargue la malla correcta de lágrima (que ya incluye la recta).
            const finalCompiled = [];
            compiled.forEach(p => {
                if (p.type === 'rotonda' || p.subtype === 'rotonda' || p.subtype === 'rotonda_connect') {
                    finalCompiled.push({ 
                        ...p, 
                        type: 'rotonda',
                        subtype: 'rotonda'
                    });
                } else {
                    finalCompiled.push(p);
                }
            });

            return finalCompiled;
        };

        const DrawEngine2D = {
            drawRails: (ctx, l, off, brand) => {
                ctx.strokeStyle = brand.railColor; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, -off); ctx.lineTo(l, -off); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, off); ctx.lineTo(l, off); ctx.stroke();
                ctx.strokeStyle = brand.slotColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, -off); ctx.lineTo(l, -off); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, off); ctx.lineTo(l, off); ctx.stroke();
            },
            drawDigitalWedge: (ctx, l, startLaneY, directionY, s) => {
               ctx.fillStyle = '#d1d5db'; ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 1; ctx.beginPath(); const xStart = l * 0.15, xEnd = l * 0.40, indent = 3 * (s/5), yStraight = startLaneY + (directionY * 1.5), wedgeW = 12 * (s/5);

                ctx.clearRect(0, 0, width, height); const tempView = { x: 0, y: 0, scale: 1.0 }; const brandName = circuit.brand || 'SCX_ANALOG';
                ctx.save(); ctx.globalAlpha = 0;

                const positions = DrawEngine2D.renderTrack(ctx, absPieces, tempView, brandName, [], null, {current: new Map()}, circuit.boardPoints, circuit.boardClosed); ctx.restore();
                if (positions.length === 0) return;
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                positions.forEach(p => { if (p.inX < minX) minX = p.inX; if (p.inX > maxX) maxX = p.inX; if (p.inY < minY) minY = p.inY; if (p.inY > maxY) maxY = p.inY; });
                if (circuit.boardPoints && circuit.boardPoints.length > 0) { circuit.boardPoints.forEach(p => { if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x; if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; }); }
                const contentW = maxX - minX; const contentH = maxY - minY; const padding = 15;
                const scaleX = (width - padding * 2) / Math.max(contentW, 10); const scaleY = (height - padding * 2) / Math.max(contentH, 10); const fitScale = Math.min(scaleX, scaleY);
                const contentCX = (minX + maxX) / 2; const contentCY = (minY + maxY) / 2;
                const finalOffsetX = (width / 2) - (contentCX * fitScale); const finalOffsetY = (height / 2) - (contentCY * fitScale);
                const finalView = { x: finalOffsetX, y: finalOffsetY, scale: fitScale };

                  }
                  return p;

                  const isLastExtra = (i === extraTracks);

                          hideLeftWall: hideL,
                          hideRightWall: hideR,
                          x: newX,
                          y: newY,
                          rot: bp.rot

                          const hasCenterBlock = ['analog_connect', 'connection', 'digital_console'].includes(bp.subtype) || (bp.type && bp.type.includes('pit'));

                              }

                          <div className="relative">
                              <form onSubmit={handleSendMessage} className="p-2 border-t border-cyan-500/30 bg-black/60 rounded-b-xl flex gap-2 z-20 relative">
                                  <input type="text" value={newMessage} onChange={(e)=>setNewMessage(e.target.value)} onKeyDown={(e)=>e.stopPropagation()} placeholder={t.chat.placeholder} className="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:border-cyan-400 outline-none transition-colors select-text cursor-text" style={{ userSelect: 'text' }} disabled={!user || user.isAnonymous || !user.emailVerified}/>
                                  <button type="submit" disabled={!newMessage.trim() || !user || user.isAnonymous || !user.emailVerified} className="bg-cyan-600 hover:bg-cyan-500 text-black px-3 py-2 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed active:scale-95"><MessageSquare size={14} className="fill-current"/></button>
                              </form>
                              {(!user || user.isAnonymous || !user.emailVerified) && (
                                  <div className="absolute inset-0 bg-black/80 backdrop-blur-[2px] rounded-b-xl flex flex-col items-center justify-center z-30 cursor-default">
                                      <div className="px-4 text-center mb-3"><span className="text-[10px] text-gray-300 font-bold uppercase tracking-wider">{t.chat.loginReq}</span></div>
                                      <button onClick={async (e) => { 
                                          e.preventDefault(); 
                                          if (user && !user.isAnonymous) {
                                              try {
                                                  const auth = window.FirebaseAPI.getAuth();
                                                  await auth.currentUser.reload();
                                                  setUser({ ...auth.currentUser });
                                                  if (auth.currentUser.emailVerified) return;
                                              } catch(err) {}
                                          }
                                          alert(t.auth.reqVerify); 
                                          setShowAuthModal(true); 
                                      }} className="px-4 py-1.5 bg-cyan-600 hover:bg-cyan-500 text-black font-black text-[10px] rounded uppercase tracking-widest transition-colors shadow-[0_0_10px_rgba(6,182,212,0.3)]">{(!user || user.isAnonymous) ? t.auth.loginBtn : t.auth.verifyCheck}</button>
                                  </div>
                              )}
                          </div>
                      </div>
                  )}

                  <div className="absolute bottom-6 left-0 w-full flex justify-center md:justify-start md:left-6 px-4 md:px-0 pointer-events-none z-30"> 
                      <div onPointerDown={(e)=>e.stopPropagation()} className="flex gap-3 pointer-events-auto bg-black/40 p-3 rounded-xl backdrop-blur-sm border border-cyan-500/30 shadow-[0_0_20px_rgba(6,182,212,0.2)] relative overflow-x-auto hide-scrollbar max-w-full"> 
                          <button onClick={handleUndo} className={`shrink-0 flex flex-col items-center justify-center w-20 h-20 bg-gray-900/90 border border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.4)] rounded-lg text-cyan-400 hover:bg-cyan-950/50 active:scale-95 active:shadow-none transition-all group ${historyStep === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]'}`} title={t.actions.undo} disabled={historyStep === 0}> <Undo2 size={24} className="mb-1 group-hover:scale-110 transition-transform"/> <span className="text-[9px] font-black tracking-widest">{t.actions.undo}</span> </button> 
                          <button onClick={handleRedo} className={`shrink-0 flex flex-col items-center justify-center w-20 h-20 bg-gray-900/90 border border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.4)] rounded-lg text-cyan-400 hover:bg-cyan-950/50 active:scale-95 active:shadow-none transition-all group ${historyStep < history.length - 1 ? 'hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]' : 'opacity-50 cursor-not-allowed'}`} title={t.actions.redo} disabled={historyStep === history.length - 1}> <Redo2 size={24} className="mb-1 group-hover:scale-110 transition-transform"/> <span className="text-[9px] font-black tracking-widest">{t.actions.redo}</span> </button> 
                          <button onClick={handleZoomOut} className="shrink-0 flex flex-col items-center justify-center w-20 h-20 bg-gray-900/90 border border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.4)] rounded-lg text-cyan-400 hover:bg-cyan-950/50 active:scale-95 active:shadow-none transition-all group hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]"> <ZoomOut size={24} className="mb-1 group-hover:scale-110 transition-transform"/> <span className="text-[9px] font-black tracking-widest">{t.actions.zoomOut}</span> </button> 
                          <button onClick={fitToScreen} className="shrink-0 flex flex-col items-center justify-center w-20 h-20 bg-gray-900/90 border border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.4)] rounded-lg text-cyan-400 hover:bg-cyan-950/50 active:scale-95 active:shadow-none transition-all group hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]"> <Crosshair size={24} className="mb-1 group-hover:rotate-45 transition-transform"/> <span className="text-[9px] font-black tracking-widest">{t.actions.center}</span> </button> 
                          <button onClick={handleZoomIn} className="shrink-0 flex flex-col items-center justify-center w-20 h-20 bg-gray-900/90 border border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.4)] rounded-lg text-cyan-400 hover:bg-cyan-950/50 active:scale-95 active:shadow-none transition-all group hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]"> <ZoomIn size={24} className="mb-1 group-hover:scale-110 transition-transform"/> <span className="text-[9px] font-black tracking-widest">{t.actions.zoomIn}</span> </button> 
                          <button onClick={() => setIsMultiSelectMode(!isMultiSelectMode)} className={`shrink-0 flex flex-col items-center justify-center w-20 h-20 bg-gray-900/90 border rounded-lg transition-all group active:scale-95 ${isMultiSelectMode ? 'border-cyan-300 text-white shadow-[0_0_25px_rgba(6,182,212,0.8)] bg-cyan-800/80' : 'border-cyan-500 text-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:bg-cyan-950/50 hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]'}`}> <CheckSquare size={24} className={`mb-1 transition-transform ${isMultiSelectMode ? 'scale-110' : 'group-hover:scale-110'}`}/> <span className="text-[9px] font-black tracking-widest">{t.actions.multiselect}</span> </button>
                          
                          <button disabled title="Desactivado temporalmente" className="shrink-0 flex flex-col items-center justify-center w-20 h-20 rounded-lg transition-all z-20 opacity-40 cursor-not-allowed border border-gray-700 text-gray-500 bg-gray-900/50 line-through decoration-red-500/50"> 
                              <Settings size={26} className="mb-1 z-10 opacity-100 text-gray-500"/>
                              <span className="text-[8px] font-black tracking-widest z-10 text-center leading-tight uppercase relative text-gray-500">MI<br/>GARAJE</span> 
                          </button> 

                          <button disabled title="Desactivado temporalmente" className="shrink-0 flex flex-col items-center justify-center w-20 h-20 rounded-lg transition-all z-20 opacity-40 cursor-not-allowed border border-gray-700 text-gray-500 bg-gray-900/50 line-through decoration-red-500/50"> 
                              <SlotCarIcon size={26} className="mb-1 z-10 opacity-100 text-gray-500"/>
                              <span className="text-[8px] font-black tracking-widest z-10 text-center leading-tight uppercase relative text-gray-500">3D SLOT<br/>GAME</span> 
                          </button> 
                      </div> 
                  </div>
                  
                  {(() => {
                      const selectedPieces = selectedPieceIds.map(id => pieces.find(p=>p && p.uid===id)).filter(Boolean);
                      if (selectedPieces.length === 0) return null;
                      
                      if (selectedPieces.length > 1) {
                          return (
                              <div className={`absolute top-6 right-6 bg-[#0f172a]/90 p-5 rounded-2xl shadow-2xl border w-72 backdrop-blur-md ${neonClass}`}> 
                                  <div className="flex justify-between items-start mb-4 border-b border-white/10 pb-3">
                                      <div><h3 className="text-lg font-black text-white">{selectedPieces.length} PIEZAS</h3></div>
                                      <button onClick={()=>setSelectedPieceIds([])} className="hover:text-white text-gray-500 transition"><X size={20}/></button>
                                  </div> 
                                  
                                  <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner text-center">
                                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Layers size={14} className="text-cyan-400"/> ELEVACIÓN GRUPAL</span>
                                    <div className="flex items-center justify-between bg-black/60 rounded-lg border border-white/5 p-1">
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, elevation: Math.round(((p.elevation || 0) - 0.25) * 100) / 100 } : p))} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-purple-900/80 text-white rounded-md transition-colors border border-transparent hover:border-purple-500/50 active:scale-95"><Minus size={16}/></button>
                                        <div className="flex flex-col items-center justify-center min-w-[60px]"><span className="text-xl font-black text-cyan-400">+/-</span></div>
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, elevation: Math.round(((p.elevation || 0) + 0.25) * 100) / 100 } : p))} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-cyan-900/80 text-white rounded-md transition-colors border border-transparent hover:border-cyan-500/50 active:scale-95"><Plus size={16}/></button>
                                    </div>
                                </div>
        
                                <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner">
                                    <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Shield size={14} className="text-red-400"/> {t.tools.borders}</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, borderLeft: true } : p))} className="flex-1 py-2 rounded text-[9px] font-bold border transition-colors bg-gray-800 border-gray-600 text-gray-400 hover:text-white hover:bg-red-600">+ {t.piece.left}</button>
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, borderRight: true } : p))} className="flex-1 py-2 rounded text-[9px] font-bold border transition-colors bg-gray-800 border-gray-600 text-gray-400 hover:text-white hover:bg-red-600">+ {t.piece.right}</button>
                                    </div>
                                    <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, borderLeft: false, borderRight: false } : p))} className="w-full mt-2 py-2 rounded text-[9px] font-bold bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white transition uppercase border border-gray-700 active:scale-95">QUITAR BORDES</button>
                                </div>
        
                                <div className="space-y-4"> 
                                    <button onClick={toggleInvertPiece} className="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl text-xs font-bold bg-[#1e293b] text-gray-400 border border-[#334155] hover:bg-[#334155] transition shadow-[0_0_10px_rgba(255,255,255,0.1)] hover:shadow-[0_0_15px_rgba(255,255,255,0.2)] mb-4"><Repeat size={18}/> INVERTIR GRUPO</button> 
                                </div> 
                                  
                                  <div className="pt-3 mt-4 border-t border-white/10 space-y-2">
                                      <button onClick={removePiece} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/20 text-red-500 border border-red-900/50 rounded-xl text-xs font-bold hover:bg-red-900/40 transition shadow-[0_0_10px_rgba(239,68,68,0.2)] hover:shadow-[0_0_20px_rgba(239,68,68,0.4)]">
                                          <Trash2 size={18}/> ELIMINAR GRUPO
                                      </button>
                                  </div>
                              </div> 
                          );
                      }

                      const selectedPiece = selectedPieces[0];
                      return ( 
                          <div className={`absolute top-6 right-6 bg-[#0f172a]/90 p-5 rounded-2xl shadow-2xl border w-72 backdrop-blur-md ${neonClass}`}> 
                              <div className="flex justify-between items-start mb-4 border-b border-white/10 pb-3">
                                  <div><h3 className="text-lg font-black text-white">{tp(selectedPiece.label)}</h3></div>
                                  <button onClick={()=>setSelectedPieceIds([])} className="hover:text-white text-gray-500 transition"><X size={20}/></button>
                              </div> 
                              
                              <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner text-center">
                                  <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Layers size={14} className="text-cyan-400"/> {t.piece.elevation}</span>
                                <div className="flex items-center justify-between bg-black/60 rounded-lg border border-white/5 p-1">
                                    <button onClick={() => setPieceElevation(Math.round(((selectedPiece.elevation || 0) - 0.25) * 100) / 100)} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-purple-900/80 text-white rounded-md transition-colors border border-transparent hover:border-purple-500/50 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"><Minus size={16}/></button>
                                    <div className="flex flex-col items-center justify-center min-w-[60px]"><span className={`text-xl font-black ${selectedPiece.elevation > 0 ? 'text-cyan-400' : (selectedPiece.elevation < 0 ? 'text-purple-400' : 'text-white')}`}>{selectedPiece.elevation > 0 ? `+${selectedPiece.elevation}` : (selectedPiece.elevation || 0)}</span><span className="text-[8px] text-gray-500 uppercase tracking-wider">{selectedPiece.elevation === 0 ? t.piece.ground : t.piece.level}</span></div>
                                    <button onClick={() => setPieceElevation(Math.round(((selectedPiece.elevation || 0) + 0.25) * 100) / 100)} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-cyan-900/80 text-white rounded-md transition-colors border border-transparent hover:border-cyan-500/50 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"><Plus size={16}/></button>
                                </div>
                            </div>
    
                            <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner">
                                <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Shield size={14} className="text-red-400"/> {t.tools.borders}</span>
                                <div className="flex gap-2">
                                    <button onClick={() => pushHistory(applyToPiece(selectedPiece.uid, { borderLeft: !selectedPiece.borderLeft }))} className={`flex-1 py-2 rounded text-[9px] font-bold border transition-colors ${selectedPiece.borderLeft ? 'bg-red-600 border-red-400 text-white' : 'bg-gray-800 border-gray-600 text-gray-400 hover:text-white'}`}>{t.piece.left} {selectedPiece.borderLeft ? 'ON' : 'OFF'}</button>
                                    <button onClick={() => pushHistory(applyToPiece(selectedPiece.uid, { borderRight: !selectedPiece.borderRight }))} className={`flex-1 py-2 rounded text-[9px] font-bold border transition-colors ${selectedPiece.borderRight ? 'bg-red-600 border-red-400 text-white' : 'bg-gray-800 border-gray-600 text-gray-400 hover:text-white'}`}>{t.piece.right} {selectedPiece.borderRight ? 'ON' : 'OFF'}</button>
                                </div>
                            </div>
    
                            <div className="space-y-4"> 
                                <button onClick={toggleInvertPiece} className="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl text-xs font-bold bg-[#1e293b] text-gray-400 border border-[#334155] hover:bg-[#334155] transition shadow-[0_0_10px_rgba(255,255,255,0.1)] hover:shadow-[0_0_15px_rgba(255,255,255,0.2)]"><Repeat size={18}/> {t.piece.invert}</button> 
                            </div> 
                              
                              <div className="pt-3 mt-4 border-t border-white/10 space-y-2">
                                  <button onClick={removePiece} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/20 text-red-500 border border-red-900/50 rounded-xl text-xs font-bold hover:bg-red-900/40 transition shadow-[0_0_10px_rgba(239,68,68,0.2)] hover:shadow-[0_0_20px_rgba(239,68,68,0.4)]">
                                      <Trash2 size={18}/> {t.piece.delete}
                                  </button>
                              </div>
                          </div> 
                      );
                  })()}
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            try { const root = ReactDOM.createRoot(rootElement); root.render(<SlotDesigner />); } 
            catch (error) { console.error("Error al renderizar:", error); document.getElementById('loading-screen').innerHTML = `<h2 class="text-xl text-red-500 font-bold">Error fatal</h2><p class="text-white">${error.message}</p>`; }
        }
    </script>
</body>
</html>
